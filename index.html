<!DOCTYPE html>
<html lang="id">
  <head>
    <link rel="icon" href="Logo.jpeg" type="image/jpeg" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cek Khodam by Ben</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Marcellus&family=Nunito+Sans:wght@400;600;700;800&display=swap");

      :root {
        --void: #0d0a1a;
        --void-2: #180f2e;
        --ember: #d4af37;
        --ember-soft: #f0d878;
        --violet: #7d5bc4;
        --violet-soft: #a98cf0;
        --smoke: #ece6f7;
        --flame: #ff6a3d;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--void);
        color: var(--smoke);
        font-family: "Nunito Sans", sans-serif;
        overflow-x: hidden;
      }

      .stage {
        position: relative;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 16px;
        background: radial-gradient(
            ellipse at 50% 20%,
            rgba(125, 91, 196, 0.35),
            transparent 60%
          ),
          radial-gradient(
            ellipse at 80% 80%,
            rgba(212, 175, 55, 0.12),
            transparent 55%
          ),
          linear-gradient(180deg, var(--void) 0%, var(--void-2) 100%);
      }

      /* ambient floating particles */
      .particles {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }
      .particle {
        position: absolute;
        bottom: -20px;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--ember-soft);
        box-shadow: 0 0 8px 2px rgba(240, 216, 120, 0.7);
        opacity: 0.7;
        animation: rise linear infinite;
      }
      @keyframes rise {
        0% {
          transform: translateY(0) translateX(0);
          opacity: 0;
        }
        10% {
          opacity: 0.8;
        }
        100% {
          transform: translateY(-110vh) translateX(var(--drift, 20px));
          opacity: 0;
        }
      }

      .card {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 480px;
        text-align: center;
      }

      .eyebrow {
        font-family: "Marcellus", serif;
        letter-spacing: 4px;
        text-transform: uppercase;
        font-size: 12px;
        color: var(--violet-soft);
        margin-bottom: 14px;
        opacity: 0.85;
      }

      h1.title {
        font-family: "Cinzel Decorative", serif;
        font-size: clamp(24px, 6vw, 34px);
        line-height: 1.25;
        margin: 0 0 18px;
        background: linear-gradient(
          180deg,
          var(--ember-soft),
          var(--ember) 60%,
          var(--flame)
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        filter: drop-shadow(0 0 18px rgba(212, 175, 55, 0.35));
      }

      p.lead {
        font-size: clamp(14px, 3.5vw, 16px);
        line-height: 1.6;
        color: rgba(236, 230, 247, 0.85);
        margin: 0 auto 34px;
        max-width: 380px;
      }
      .sigil {
        width: clamp(100px, 28vw, 132px);
        height: clamp(100px, 28vw, 132px);
        margin: 0 auto 28px;
        position: relative;
      }
      .sigil svg {
        width: 100%;
        height: 100%;
      }
      .sigil-ring {
        transform-origin: 66px 66px;
        animation: spin 14s linear infinite;
      }
      .sigil-ring.rev {
        animation-direction: reverse;
        animation-duration: 20s;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .sigil-core {
        animation: pulseGlow 2.4s ease-in-out infinite;
        transform-origin: 66px 66px;
      }
      @keyframes pulseGlow {
        0%,
        100% {
          opacity: 0.75;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.06);
        }
      }

      button.cta {
        font-family: "Marcellus", serif;
        font-size: 17px;
        letter-spacing: 1px;
        color: var(--void);
        background: linear-gradient(135deg, var(--ember-soft), var(--ember));
        border: none;
        padding: 16px 34px;
        border-radius: 999px;
        cursor: pointer;
        position: relative;
        box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.55),
          0 10px 30px -8px rgba(212, 175, 55, 0.6);
        transition: transform 0.25s ease, box-shadow 0.25s ease;
        animation: breathe 2.6s ease-in-out infinite;
      }
      button.cta:hover {
        transform: translateY(-2px) scale(1.02);
      }
      button.cta:active {
        transform: translateY(0) scale(0.98);
      }
      @keyframes breathe {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.45),
            0 10px 30px -8px rgba(212, 175, 55, 0.6);
        }
        50% {
          box-shadow: 0 0 0 14px rgba(212, 175, 55, 0),
            0 10px 30px -8px rgba(212, 175, 55, 0.6);
        }
      }

      .credit {
        margin-top: 30px;
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: rgba(169, 140, 240, 0.6);
      }

      /* ---- Input screen ---- */
      .field {
        position: relative;
        margin-bottom: 22px;
      }
      input.name-input {
        width: 100%;
        padding: 18px 20px;
        font-size: 16px;
        font-family: "Nunito Sans", sans-serif;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(169, 140, 240, 0.35);
        border-radius: 14px;
        color: var(--smoke);
        outline: none;
        transition: border-color 0.25s ease, box-shadow 0.25s ease;
      }
      input.name-input::placeholder {
        color: rgba(236, 230, 247, 0.4);
      }
      input.name-input:focus {
        border-color: var(--ember);
        box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15);
      }

      /* ---- Loading screen ---- */
      .loading-text {
        font-family: "Marcellus", serif;
        font-size: 16px;
        color: var(--violet-soft);
        min-height: 24px;
        letter-spacing: 0.5px;
      }
      .bar {
        width: 220px;
        height: 3px;
        margin: 22px auto 0;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 4px;
        overflow: hidden;
      }
      .bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--violet), var(--ember));
        animation: fillbar 3s ease forwards;
      }
      @keyframes fillbar {
        to {
          width: 100%;
        }
      }

      /* ---- Result screen ---- */
      .result-badge {
        width: clamp(120px, 34vw, 168px);
        height: clamp(120px, 34vw, 168px);
        margin: 0 auto 22px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: clamp(46px, 12vw, 70px);
        background: radial-gradient(
          circle at 35% 30%,
          rgba(240, 216, 120, 0.35),
          rgba(125, 91, 196, 0.15) 60%,
          transparent 70%
        );
        border: 1px solid rgba(212, 175, 55, 0.4);
        position: relative;
        animation: reveal-pop 0.7s cubic-bezier(0.2, 1.4, 0.4, 1) both;
      }
      .result-badge::before {
        content: "";
        position: absolute;
        inset: -14px;
        border-radius: 50%;
        border: 1px dashed rgba(169, 140, 240, 0.4);
        animation: spin 16s linear infinite;
      }
      @keyframes reveal-pop {
        0% {
          opacity: 0;
          transform: scale(0.4) rotate(-25deg);
          filter: blur(6px);
        }
        60% {
          opacity: 1;
          transform: scale(1.08) rotate(4deg);
          filter: blur(0);
        }
        100% {
          transform: scale(1) rotate(0deg);
        }
      }

      .khodam-name {
        font-family: "Cinzel Decorative", serif;
        font-size: clamp(20px, 5.5vw, 26px);
        line-height: 1.4;
        margin: 0 0 14px;
        background: linear-gradient(180deg, var(--ember-soft), var(--ember));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: fadeUp 0.6s ease 0.15s both;
      }
      .khodam-desc {
        font-size: 15px;
        line-height: 1.7;
        color: rgba(236, 230, 247, 0.85);
        margin: 0 auto 30px;
        max-width: 380px;
        animation: fadeUp 0.6s ease 0.3s both;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .name-tag {
        display: inline-block;
        font-size: 13px;
        letter-spacing: 1px;
        color: var(--violet-soft);
        text-transform: uppercase;
        margin-bottom: 6px;
        animation: fadeUp 0.5s ease both;
      }

      button.ghost {
        font-family: "Marcellus", serif;
        font-size: 14px;
        letter-spacing: 1px;
        color: var(--violet-soft);
        background: transparent;
        border: 1px solid rgba(169, 140, 240, 0.4);
        padding: 12px 26px;
        border-radius: 999px;
        cursor: pointer;
        transition: all 0.25s ease;
      }
      button.ghost:hover {
        border-color: var(--ember);
        color: var(--ember-soft);
      }

      .screen {
        display: none;
      }
      .screen.active {
        display: block;
        animation: screenIn 0.5s ease;
      }
      @keyframes screenIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* burst particles on reveal */
      .burst {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: visible;
      }
      .spark {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--ember-soft);
        box-shadow: 0 0 10px 2px rgba(240, 216, 120, 0.8);
        animation: spark-out 0.9s ease-out forwards;
      }
      @keyframes spark-out {
        0% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 1;
        }
        100% {
          transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty)))
            scale(0);
          opacity: 0;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation: none !important;
        }
      }
      .corner-image {
        position: fixed;
        top: clamp(10px, 3vw, 20px);
        right: clamp(10px, 3vw, 20px);
        width: clamp(48px, 12vw, 80px);
        height: auto;
        z-index: 10;
        border-radius: 12px;
        filter: drop-shadow(0 0 12px rgba(212, 175, 55, 0.4));
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          animation: none !important;
        }
      }
      @media (max-width: 380px) {
        .stage {
          padding: 20px 12px;
        }
        .eyebrow {
          font-size: 11px;
          letter-spacing: 3px;
        }
        button.cta {
          padding: 14px 24px;
          font-size: 15px;
        }
        .khodam-desc {
          font-size: 14px;
        }
      }

      @media (min-width: 768px) {
        .card {
          max-width: 520px;
        }
      }

      @media (min-width: 1200px) {
        .card {
          max-width: 560px;
        }
      }
    </style>
  </head>
  <body>
    <img src="KTM.png" class="corner-image" alt="Logo" />
    <div class="particles" id="particles"></div>

    <div class="stage">
      <!-- SCREEN 1: WELCOME -->
      <div class="card screen active" id="screen-welcome">
        <div class="eyebrow">Ritual Digital</div>
        <div class="sigil">
          <svg viewBox="0 0 132 132">
            <g class="sigil-ring">
              <circle
                cx="66"
                cy="66"
                r="58"
                fill="none"
                stroke="rgba(169,140,240,0.45)"
                stroke-width="1.2"
                stroke-dasharray="4 7"
              />
            </g>
            <g class="sigil-ring rev">
              <circle
                cx="66"
                cy="66"
                r="46"
                fill="none"
                stroke="rgba(212,175,55,0.5)"
                stroke-width="1"
              />
              <polygon
                points="66,20 108,90 24,90"
                fill="none"
                stroke="rgba(212,175,55,0.55)"
                stroke-width="1"
              />
            </g>
            <circle class="sigil-core" cx="66" cy="66" r="16" fill="url(#g1)" />
            <defs>
              <radialGradient id="g1" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#f0d878" />
                <stop offset="100%" stop-color="#7d5bc4" stop-opacity="0.2" />
              </radialGradient>
            </defs>
          </svg>
        </div>
        <h1 class="title">Hallo, Selamat Datang<br />di Web Cek Khodam</h1>
        <p class="lead">Cobain Geh</p>
        <button class="cta" onclick="goTo('screen-input')">
          Lakukan Pengecekan Khodam
        </button>
        <div class="credit">by Ben</div>
      </div>

      <!-- SCREEN 2: INPUT NAME -->
      <div class="card screen" id="screen-input">
        <div class="eyebrow">Langkah 1 dari 2</div>
        <h1 class="title" style="font-size: 26px">Siapa Namamu?</h1>
        <p class="lead">
          Tuliskan nama lengkapmu. Alam gaib mengenali setiap orang lewat
          namanya.
        </p>
        <div class="field">
          <input
            type="text"
            class="name-input"
            id="nameInput"
            placeholder="Masukkan nama lengkap..."
            maxlength="60"
            autocomplete="off"
          />
        </div>
        <button class="cta" onclick="startRitual()">
          ✨ Mulai Ritual Pengecekan
        </button>
      </div>

      <!-- SCREEN 3: LOADING -->
      <div class="card screen" id="screen-loading">
        <div class="sigil" style="width: 150px; height: 150px">
          <svg viewBox="0 0 132 132">
            <g class="sigil-ring">
              <circle
                cx="66"
                cy="66"
                r="58"
                fill="none"
                stroke="rgba(169,140,240,0.6)"
                stroke-width="1.4"
                stroke-dasharray="3 6"
              />
            </g>
            <g class="sigil-ring rev">
              <circle
                cx="66"
                cy="66"
                r="46"
                fill="none"
                stroke="rgba(212,175,55,0.65)"
                stroke-width="1.2"
              />
              <polygon
                points="66,20 108,90 24,90"
                fill="none"
                stroke="rgba(212,175,55,0.65)"
                stroke-width="1.2"
              />
            </g>
            <circle class="sigil-core" cx="66" cy="66" r="18" fill="url(#g2)" />
            <defs>
              <radialGradient id="g2" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#f0d878" />
                <stop offset="100%" stop-color="#7d5bc4" stop-opacity="0.2" />
              </radialGradient>
            </defs>
          </svg>
        </div>
        <div class="loading-text" id="loadingText">
          Membuka gerbang alam gaib...
        </div>
        <div class="bar"><div class="bar-fill"></div></div>
      </div>

      <!-- SCREEN 4: RESULT -->
      <div class="card screen" id="screen-result">
        <div class="name-tag" id="resultForName"></div>
        <div style="position: relative">
          <div class="result-badge" id="resultEmoji">🐉</div>
          <div class="burst" id="burst"></div>
        </div>
        <h1 class="khodam-name" id="resultName">Naga Petir</h1>
        <p class="khodam-desc" id="resultDesc">
          Deskripsi khodam akan muncul di sini.
        </p>
        <button class="ghost" onclick="resetRitual()">↺ Cek Nama Lain</button>
      </div>
    </div>

    <script>
      // ambient particles
      const pField = document.getElementById("particles");
      for (let i = 0; i < 26; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.style.left = Math.random() * 100 + "vw";
        p.style.setProperty("--drift", Math.random() * 60 - 30 + "px");
        p.style.animationDuration = 6 + Math.random() * 8 + "s";
        p.style.animationDelay = Math.random() * 8 + "s";
        p.style.width = p.style.height = 2 + Math.random() * 3 + "px";
        pField.appendChild(p);
      }

      function goTo(id) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
      }

      const creatures = [
        ["🐉", "Naga"],
        ["🐯", "Harimau"],
        ["🦅", "Elang"],
        ["🦁", "Singa"],
        ["🐍", "Ular"],
        ["🐺", "Serigala"],
        ["🐘", "Gajah"],
        ["🦉", "Burung Hantu"],
        ["🐊", "Buaya"],
        ["🦌", "Rusa"],
        ["🐆", "Macan Tutul"],
        ["🦂", "Kalajengking"],
        ["🐢", "Kura-Kura"],
        ["🦇", "Kelelawar"],
        ["🐦‍⬛", "Gagak"],
      ];
      const titles = [
        "Putih",
        "Hitam Legam",
        "Emas",
        "Petir",
        "Api Abadi",
        "Es Purba",
        "Bayangan",
        "Cahaya Senja",
        "Malam",
        "Sakti Mandraguna",
        "Kesatria",
        "Legendaris",
        "Gaib",
        "Angin Timur",
        "Berbisa",
      ];
      const origins = [
        "dari Puncak Gunung Semeru",
        "dari Palung Laut Selatan",
        "dari Hutan Larangan",
        "dari Reruntuhan Kerajaan Majapahit",
        "dari Alam Kedua",
        "dari Puncak Himalaya",
        "dari Goa Seribu Tahun",
        "dari Negeri Atas Angin",
        "dari Istana Bawah Laut",
        "dari Rimba Kalimantan",
        "dari Lembah Berkabut",
        "dari Candi Tersembunyi",
      ];
      const descriptions = [
        "Ia menyertai langkahmu dalam diam, memberi insting tajam saat kau berada di persimpangan keputusan besar.",
        "Kehadirannya membuatmu sulit ditaklukkan dalam perdebatan maupun persaingan. Wibawa alami mengalir darimu.",
        "Ia adalah penjaga energimu, menyerap kelelahan batin dan menjaga semangatmu tetap menyala di saat gelap.",
        "Sosok ini dikenal melindungi pemiliknya dari niat buruk orang lain tanpa pemiliknya sadari.",
        "Ia membisikkan intuisi lembut yang sering kau anggap sebagai firasat atau kebetulan.",
        "Kehadirannya membuat orang di sekitarmu merasa nyaman, meski kau sendiri tak menyadari daya tarik itu.",
        "Ia adalah simbol keteguhan; membuatmu bangkit lebih cepat setiap kali dunia menjatuhkanmu.",
        "Sosok ini menuntunmu pada jalan yang tak terduga, sering membawa keberuntungan di saat-saat kritis.",
        "Ia menjaga mimpi burukmu tetap terkendali dan memberi ketenangan saat malam terasa panjang.",
        "Kehadirannya membuatmu punya kharisma yang sulit dijelaskan namun mudah dirasakan orang lain.",
      ];

      const loadingMessages = [
        "Membuka gerbang alam gaib...",
        "Menyelaraskan frekuensi batin...",
        "Memanggil penunggu tak kasat mata...",
        "Menghubungkan nama dengan alam semesta...",
      ];

      function hashName(str) {
        let h = 0;
        for (let i = 0; i < str.length; i++) {
          h = (h * 31 + str.charCodeAt(i)) >>> 0;
        }
        return h;
      }

      function startRitual() {
        const val = document.getElementById("nameInput").value.trim();
        if (!val) {
          const input = document.getElementById("nameInput");
          input.style.borderColor = "#ff6a3d";
          input.placeholder = "Nama tidak boleh kosong...";
          input.focus();
          return;
        }
        goTo("screen-loading");

        let msgIndex = 0;
        const textEl = document.getElementById("loadingText");
        textEl.textContent = loadingMessages[0];
        const interval = setInterval(() => {
          msgIndex = (msgIndex + 1) % loadingMessages.length;
          textEl.textContent = loadingMessages[msgIndex];
        }, 750);

        setTimeout(() => {
          clearInterval(interval);
          showResult(val);
        }, 3000);
      }

      function showResult(name) {
        const h = hashName(name.toLowerCase());
        const creature = creatures[h % creatures.length];
        const title = titles[Math.floor(h / 7) % titles.length];
        const origin = origins[Math.floor(h / 13) % origins.length];
        const desc = descriptions[Math.floor(h / 17) % descriptions.length];

        document.getElementById("resultForName").textContent =
          "Khodam milik " + name;
        document.getElementById("resultEmoji").textContent = creature[0];
        document.getElementById("resultName").textContent =
          creature[1] + " " + title + " " + origin;
        document.getElementById("resultDesc").textContent = desc;

        goTo("screen-result");
        fireBurst();
      }

      function fireBurst() {
        const burst = document.getElementById("burst");
        burst.innerHTML = "";
        const count = 18;
        for (let i = 0; i < count; i++) {
          const s = document.createElement("div");
          s.className = "spark";
          const angle = ((Math.PI * 2) / count) * i + Math.random() * 0.3;
          const dist = 60 + Math.random() * 50;
          s.style.setProperty("--tx", Math.cos(angle) * dist + "px");
          s.style.setProperty("--ty", Math.sin(angle) * dist + "px");
          s.style.animationDelay = Math.random() * 0.15 + "s";
          burst.appendChild(s);
        }
      }

      function resetRitual() {
        document.getElementById("nameInput").value = "";
        document.getElementById("nameInput").style.borderColor = "";
        document.getElementById("nameInput").placeholder =
          "Masukkan nama lengkap...";
        goTo("screen-input");
      }

      document.getElementById("nameInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") startRitual();
      });
    </script>
  </body>
</html>
